<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner circle backdrop -->
  <circle cx="256" cy="240" r="160" fill="white" opacity="0.15"/>

  <!-- Calculator/abacus top bar -->
  <rect x="156" y="72" width="200" height="8" rx="4" fill="white" opacity="0.5"/>
  <circle cx="196" cy="76" r="6" fill="white" opacity="0.7"/>
  <circle cx="256" cy="76" r="6" fill="white" opacity="0.7"/>
  <circle cx="316" cy="76" r="6" fill="white" opacity="0.7"/>

  <!-- Main content area - white card -->
  <rect x="106" y="100" width="300" height="280" rx="24" ry="24" fill="white" filter="url(#innerShadow)"/>

  <!-- Plus sign (top-left quadrant) -->
  <g transform="translate(176, 170)">
    <rect x="-24" y="-4" width="48" height="8" rx="4" fill="#4F46E5"/>
    <rect x="-4" y="-24" width="8" height="48" rx="4" fill="#4F46E5"/>
  </g>

  <!-- Minus sign (top-right quadrant) -->
  <g transform="translate(336, 170)">
    <rect x="-24" y="-4" width="48" height="8" rx="4" fill="#EC4899"/>
  </g>

  <!-- Multiply sign (bottom-left quadrant) -->
  <g transform="translate(176, 300)">
    <rect x="-20" y="-4" width="40" height="8" rx="4" fill="#F59E0B" transform="rotate(45)"/>
    <rect x="-20" y="-4" width="40" height="8" rx="4" fill="#F59E0B" transform="rotate(-45)"/>
  </g>

  <!-- Divide sign (bottom-right quadrant) -->
  <g transform="translate(336, 300)">
    <rect x="-24" y="-4" width="48" height="8" rx="4" fill="#10B981"/>
    <circle cx="0" cy="-16" r="6" fill="#10B981"/>
    <circle cx="0" cy="16" r="6" fill="#10B981"/>
  </g>

  <!-- Center: large equation display -->
  <text x="256" y="252" font-family="system-ui, -apple-system, 'SF Pro Rounded', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="url(#innerGrad)" text-anchor="middle" dominant-baseline="middle">1+1=2</text>

  <!-- Fraction display (small, bottom-center of card) -->
  <g transform="translate(256, 345)">
    <text x="-30" y="-8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#7C3AED" text-anchor="middle">1</text>
    <line x1="-42" y1="0" x2="-18" y2="0" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
    <text x="-30" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#7C3AED" text-anchor="middle">2</text>
    <text x="0" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#7C3AED" text-anchor="middle">+</text>
    <text x="30" y="-8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#7C3AED" text-anchor="middle">1</text>
    <line x1="18" y1="0" x2="42" y2="0" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
    <text x="30" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#7C3AED" text-anchor="middle">3</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="106" y="420" width="300" height="56" rx="28" ry="28" fill="white" opacity="0.2"/>
  <text x="256" y="452" font-family="system-ui, -apple-system, 'SF Pro Rounded', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">ARITHMETIC</text>

  <!-- Decorative stars -->
  <g fill="white" opacity="0.6">
    <polygon points="80,120 83,130 93,130 85,136 88,146 80,140 72,146 75,136 67,130 77,130" transform="scale(0.6) translate(30,50)"/>
    <polygon points="80,120 83,130 93,130 85,136 88,146 80,140 72,146 75,136 67,130 77,130" transform="scale(0.5) translate(780,60)"/>
    <polygon points="80,120 83,130 93,130 85,136 88,146 80,140 72,146 75,136 67,130 77,130" transform="scale(0.4) translate(200,900)"/>
    <polygon points="80,120 83,130 93,130 85,136 88,146 80,140 72,146 75,136 67,130 77,130" transform="scale(0.45) translate(850,870)"/>
  </g>

  <!-- Small pencil icon -->
  <g transform="translate(420, 105) rotate(30)" opacity="0.7">
    <rect x="-3" y="-20" width="6" height="30" rx="1" fill="white"/>
    <polygon points="-3,10 3,10 0,16" fill="white"/>
  </g>
</svg>
